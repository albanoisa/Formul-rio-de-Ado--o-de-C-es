<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Adoção</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="navbar"> 
        <h2> Formulário de Adoção </h2>
    </div>

    <br><br>

    <div class="container">
        <div class="imagens">
            <img src="assets/caramelo.png" alt="Cachorro caramelo">
                <img src="assets/Colle.png" alt="Colle">
        </div>

        <div class="formulario">
            <form id="formAdocao"> 
                
                <label for="nome"> Nome: </label>
                <input type="text" id="nome" placeholder="Digite seu nome"> 
                
                <br><br>
                
                <label for="email"> Email: </label>
                <input type="email" id="email" placeholder="Digite seu email">
                
                <br><br>
                
                <label for="telefone"> Telefone: </label>
                <input type="telefone" id="telefone" placeholder="Digite seu telefone">
                
                <br><br>
                
                <label for="cpf"> CPF: </label>
                <input type="cpf" id="CPF" placeholder="Digite seu CPF">
                
                <br><br>
                
                <label for="idade"> Idade: </label>
                <input type="idade" id="idade" placeholder="Digite sua idade">
                
                <br><br>
                
                <label for="cidade"> Cidade: </label>
                <input type="cidade" id="cidade" placeholder="Digite sua cidade">
                
                <br><br>
                
                <div class="a">
                    <label for="moradia"> Moradia: </label>
                    <select name="moradia" id="moradia"> 
                        <option value=""> Selecione </option>
                        <option value="Casa"> Casa </option>
                        <option value="Apartamento"> Apartamento </option>
                    </select>
                    
                    <br><br>
                    
                    <label for="quintal"> Possui Quintal? </label>
                    <input type="radio" name="quintal" value="sim"> Sim
                    <input type="radio" name="quintal" value="não"> Não
                    
                    <br><br>
                        
                    <label for="pet"> Já teve pet antes? </label>
                    <input type="radio" name="pet" value="sim"> Sim
                    <input type="radio" name="pet" value="não"> Não
                        
                    <br><br>
                        
                    <label for="animal"> Quantas horas o animal ficará sozinho por dia? </label> 
                    <br><br>
                     <select name="animal" id="animal"> 
                        <option value=""> Selecione </option>
                        <option value="horario"> 1h a 2hs </option>
                        <option value="horario"> 3hs a 4hs </option>
                        <option value="horario"> 5hs a 6hs </option>
                        <option value="horario"> 7hs a 8hs </option>
                        <option value="horario"> 9hs a 10hs </option>
                        <option value="horario"> 11hs ou + </option>
                    </select>
                  
                    <br><br>
                        
                    <label for="doacao"> Qual o motivo da adoção </label> <br> 
                    <textarea></textarea>
                        
                    <br><br>
                        
                    <label for="doacao"> Aceitar o termo de responsabilidade </label>
                    <input type="checkbox" id="opcao" name="opcao" value="item">
                        
                    <br><br>
                </div>
                    
                <br><br> 
                    
                <label for="regras">  </label>
                    
                <button type="submit"> Enviar </button>
            </form>
                
            <div id="resultado"></div>
        </div>

        <div class="imagens">
            <img src="assets/Branquinho.png" alt="Cachorro Branquinho">
            <img src="assets/Joe.png" alt="Joe">
        </div>
            <br><br>
            </div>
        </div>
    </div>

    <script src="scripts/ong.js"></script>
    
</body>
</html>
